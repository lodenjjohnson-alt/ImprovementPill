 
  
<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
<title>Life Skill Tree</title>  
<style>  
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');  
  
  :root {  
    --bg: #050508;  
    --panel: #0a0a12;  
    --finance: #a855f7;  
    --finance-dim: #3b1a5e;  
    --speech: #3b82f6;  
    --speech-dim: #1a2a5e;  
    --purpose: #eab308;  
    --purpose-dim: #4a3a00;  
    --hockey: #ef4444;  
    --hockey-dim: #5e1a1a;  
    --knowledge: #22c55e;  
    --knowledge-dim: #0f3a1f;  
    --health: #f97316;  
    --health-dim: #4a2200;  
  }  
  
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }  
  
  body {  
    background: var(--bg);  
    color: #fff;  
    font-family: 'Rajdhani', sans-serif;  
    min-height: 100vh;  
    overflow-x: hidden;  
  }  
  
  /* Starfield */  
  body::before {  
    content: '';  
    position: fixed;  
    inset: 0;  
    background-image:  
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),  
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),  
      radial-gradient(1px 1px at 55% 25%, rgba(255,255,255,0.5) 0%, transparent 100%),  
      radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.2) 0%, transparent 100%),  
      radial-gradient(1px 1px at 85% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),  
      radial-gradient(1px 1px at 20% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),  
      radial-gradient(1px 1px at 92% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),  
      radial-gradient(1px 1px at 45% 95%, rgba(255,255,255,0.2) 0%, transparent 100%),  
      radial-gradient(1px 1px at 65% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),  
      radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,0.3) 0%, transparent 100%);  
    pointer-events: none;  
    z-index: 0;  
  }  
  
  /* ── OVERVIEW SCREEN ── */  
  #overview {  
    position: relative;  
    z-index: 1;  
    min-height: 100vh;  
    padding: 0 16px 40px;  
  }  
  
  .top-bar {  
    display: flex;  
    align-items: center;  
    justify-content: space-between;  
    padding: 20px 0 10px;  
  }  
  
  .game-title {  
    font-family: 'Orbitron', monospace;  
    font-size: 18px;  
    font-weight: 900;  
    letter-spacing: 3px;  
    background: linear-gradient(90deg, #a855f7, #3b82f6, #22c55e, #eab308, #f97316, #ef4444);  
    -webkit-background-clip: text;  
    -webkit-text-fill-color: transparent;  
    background-clip: text;  
    text-shadow: none;  
    filter: drop-shadow(0 0 8px rgba(168,85,247,0.5));  
  }  
  
  .total-xp {  
    font-family: 'Orbitron', monospace;  
    font-size: 11px;  
    color: rgba(255,255,255,0.5);  
    letter-spacing: 1px;  
  }  
  
  .total-xp span {  
    color: #fff;  
    font-weight: 700;  
  }  
  
  .overview-subtitle {  
    text-align: center;  
    color: rgba(255,255,255,0.3);  
    font-size: 13px;  
    letter-spacing: 2px;  
    text-transform: uppercase;  
    margin-bottom: 28px;  
    margin-top: 4px;  
  }  
  
  /* Branch grid */  
  .branches-grid {  
    display: grid;  
    grid-template-columns: 1fr 1fr;  
    gap: 14px;  
  }  
  
  .branch-card {  
    background: var(--panel);  
    border: 1px solid rgba(255,255,255,0.06);  
    border-radius: 16px;  
    padding: 18px 14px 16px;  
    cursor: pointer;  
    position: relative;  
    overflow: hidden;  
    transition: transform 0.18s, border-color 0.18s;  
    -webkit-tap-highlight-color: transparent;  
  }  
  
  .branch-card:active { transform: scale(0.96); }  
  
  .branch-card::before {  
    content: '';  
    position: absolute;  
    inset: 0;  
    border-radius: 16px;  
    opacity: 0;  
    transition: opacity 0.3s;  
  }  
  
  .branch-card:hover::before { opacity: 1; }  
  
  .branch-card[data-branch="finance"] { border-color: rgba(168,85,247,0.25); }  
  .branch-card[data-branch="finance"]::before { background: radial-gradient(ellipse at top left, rgba(168,85,247,0.08), transparent 70%); }  
  .branch-card[data-branch="speech"] { border-color: rgba(59,130,246,0.25); }  
  .branch-card[data-branch="speech"]::before { background: radial-gradient(ellipse at top left, rgba(59,130,246,0.08), transparent 70%); }  
  .branch-card[data-branch="purpose"] { border-color: rgba(234,179,8,0.25); }  
  .branch-card[data-branch="purpose"]::before { background: radial-gradient(ellipse at top left, rgba(234,179,8,0.08), transparent 70%); }  
  .branch-card[data-branch="hockey"] { border-color: rgba(239,68,68,0.25); }  
  .branch-card[data-branch="hockey"]::before { background: radial-gradient(ellipse at top left, rgba(239,68,68,0.08), transparent 70%); }  
  .branch-card[data-branch="knowledge"] { border-color: rgba(34,197,94,0.25); }  
  .branch-card[data-branch="knowledge"]::before { background: radial-gradient(ellipse at top left, rgba(34,197,94,0.08), transparent 70%); }  
  .branch-card[data-branch="health"] { border-color: rgba(249,115,22,0.25); }  
  .branch-card[data-branch="health"]::before { background: radial-gradient(ellipse at top left, rgba(249,115,22,0.08), transparent 70%); }  
  
  .branch-icon {  
    font-size: 28px;  
    margin-bottom: 8px;  
    display: block;  
    filter: drop-shadow(0 0 6px currentColor);  
  }  
  
  .branch-name {  
    font-family: 'Orbitron', monospace;  
    font-size: 11px;  
    font-weight: 700;  
    letter-spacing: 2px;  
    text-transform: uppercase;  
    margin-bottom: 10px;  
  }  
  
  .branch-card[data-branch="finance"] .branch-name { color: var(--finance); text-shadow: 0 0 10px var(--finance); }  
  .branch-card[data-branch="speech"] .branch-name { color: var(--speech); text-shadow: 0 0 10px var(--speech); }  
  .branch-card[data-branch="purpose"] .branch-name { color: var(--purpose); text-shadow: 0 0 10px var(--purpose); }  
  .branch-card[data-branch="hockey"] .branch-name { color: var(--hockey); text-shadow: 0 0 10px var(--hockey); }  
  .branch-card[data-branch="knowledge"] .branch-name { color: var(--knowledge); text-shadow: 0 0 10px var(--knowledge); }  
  .branch-card[data-branch="health"] .branch-name { color: var(--health); text-shadow: 0 0 10px var(--health); }  
  
  .branch-progress-bar {  
    height: 4px;  
    background: rgba(255,255,255,0.06);  
    border-radius: 2px;  
    overflow: hidden;  
    margin-bottom: 6px;  
  }  
  
  .branch-progress-fill {  
    height: 100%;  
    border-radius: 2px;  
    transition: width 0.6s ease;  
  }  
  
  .branch-card[data-branch="finance"] .branch-progress-fill { background: var(--finance); box-shadow: 0 0 8px var(--finance); }  
  .branch-card[data-branch="speech"] .branch-progress-fill { background: var(--speech); box-shadow: 0 0 8px var(--speech); }  
  .branch-card[data-branch="purpose"] .branch-progress-fill { background: var(--purpose); box-shadow: 0 0 8px var(--purpose); }  
  .branch-card[data-branch="hockey"] .branch-progress-fill { background: var(--hockey); box-shadow: 0 0 8px var(--hockey); }  
  .branch-card[data-branch="knowledge"] .branch-progress-fill { background: var(--knowledge); box-shadow: 0 0 8px var(--knowledge); }  
  .branch-card[data-branch="health"] .branch-progress-fill { background: var(--health); box-shadow: 0 0 8px var(--health); }  
  
  .branch-stats {  
    font-size: 11px;  
    color: rgba(255,255,255,0.4);  
    letter-spacing: 1px;  
  }  
  
  .branch-stats strong {  
    color: rgba(255,255,255,0.8);  
  }  
  
  /* ── BRANCH DETAIL SCREEN ── */  
  #branch-view {  
    display: none;  
    position: fixed;  
    inset: 0;  
    z-index: 100;  
    background: var(--bg);  
    overflow-y: auto;  
    -webkit-overflow-scrolling: touch;  
  }  
  
  #branch-view.active { display: block; }  

  #branch-view.swiping-back {
    transition: none;
  }

  #branch-view.returning-home {
    transition: transform 0.22s ease, opacity 0.22s ease;
  }
  
  .branch-header {  
    position: sticky;  
    top: 0;  
    z-index: 10;  
    background: rgba(5,5,8,0.95);  
    backdrop-filter: blur(20px);  
    -webkit-backdrop-filter: blur(20px);  
    padding: 16px 20px 14px;  
    border-bottom: 1px solid rgba(255,255,255,0.05);  
    display: flex;  
    align-items: center;  
    gap: 14px;  
  }  
  
  .back-btn {  
    background: rgba(255,255,255,0.06);  
    border: none;  
    border-radius: 10px;  
    color: rgba(255,255,255,0.6);  
    font-size: 18px;  
    width: 38px;  
    height: 38px;  
    display: flex;  
    align-items: center;  
    justify-content: center;  
    cursor: pointer;  
    flex-shrink: 0;  
    font-family: 'Rajdhani', sans-serif;  
  }  
  
  .branch-header-info { flex: 1; }  
  
  .branch-header-name {  
    font-family: 'Orbitron', monospace;  
    font-size: 16px;  
    font-weight: 900;  
    letter-spacing: 2px;  
  }  
  
  .branch-header-xp {  
    font-size: 12px;  
    color: rgba(255,255,255,0.4);  
    margin-top: 2px;  
    letter-spacing: 1px;  
  }  
  
  /* Tree layout */  
  .tree-container {  
    padding: 24px 16px 60px;  
    position: relative;  
  }  
  
  .tier-section {  
    margin-bottom: 8px;  
  }  
  
  .tier-label {  
    font-family: 'Orbitron', monospace;  
    font-size: 9px;  
    letter-spacing: 4px;  
    color: rgba(255,255,255,0.2);  
    text-transform: uppercase;  
    margin-bottom: 12px;  
    padding-left: 4px;  
    display: flex;  
    align-items: center;  
    gap: 8px;  
  }  
  
  .tier-label::after {  
    content: '';  
    flex: 1;  
    height: 1px;  
    background: rgba(255,255,255,0.05);  
  }  
  
  .skills-row {  
    display: flex;  
    gap: 10px;  
    flex-wrap: wrap;  
    margin-bottom: 6px;  
  }  
  
  /* Connector lines */  
  .connector {  
    display: flex;  
    justify-content: center;  
    margin-bottom: 6px;  
    gap: 40px;  
  }  
  
  .connector-line {  
    width: 2px;  
    height: 28px;  
    background: rgba(255,255,255,0.08);  
    border-radius: 1px;  
    position: relative;  
    transition: background 0.4s;  
  }  
  
  .connector-line.lit {  
    background: currentColor;  
    box-shadow: 0 0 8px currentColor;  
  }  
  
  /* Skill node */  
  .skill-node {  
    background: rgba(10,10,18,0.9);  
    border: 1.5px solid rgba(255,255,255,0.08);  
    border-radius: 14px;  
    padding: 12px 12px 10px;  
    cursor: pointer;  
    position: relative;  
    transition: all 0.22s;  
    flex: 1;  
    min-width: 130px;  
    max-width: 200px;  
    -webkit-tap-highlight-color: transparent;  
  }  
  
  .skill-node:active { transform: scale(0.96); }  
  
  .skill-node.locked {  
    opacity: 0.45;  
    cursor: default;  
  }  
  
  .skill-node.completed {  
    border-color: currentColor;  
  }  
  
  .skill-node.available {  
    border-color: currentColor;  
    opacity: 0.85;  
    animation: pulse-border 2.5s infinite;  
  }  
  
  @keyframes pulse-border {  
    0%, 100% { box-shadow: 0 0 6px currentColor, inset 0 0 6px rgba(255,255,255,0.03); }  
    50% { box-shadow: 0 0 18px currentColor, inset 0 0 10px rgba(255,255,255,0.05); }  
  }  
  
  .skill-name {  
    font-family: 'Orbitron', monospace;  
    font-size: 9.5px;  
    font-weight: 700;  
    letter-spacing: 1px;  
    margin-bottom: 5px;  
    line-height: 1.3;  
  }  
  
  .skill-path {  
    display: inline-block;  
    font-family: 'Orbitron', monospace;  
    font-size: 7px;  
    letter-spacing: 1.5px;  
    text-transform: uppercase;  
    color: rgba(255,255,255,0.5);  
    background: rgba(255,255,255,0.05);  
    border: 1px solid rgba(255,255,255,0.08);  
    border-radius: 999px;  
    padding: 2px 6px;  
    margin-bottom: 6px;  
  }  

  .skill-mission {  
    font-size: 11px;  
    color: rgba(255,255,255,0.45);  
    line-height: 1.4;  
    margin-bottom: 8px;  
  }  
  
  .skill-tier-dots {  
    display: flex;  
    gap: 4px;  
    align-items: center;  
  }  
  
  .tier-dot {  
    width: 7px;  
    height: 7px;  
    border-radius: 50%;  
    background: rgba(255,255,255,0.1);  
    border: 1px solid rgba(255,255,255,0.15);  
    transition: all 0.4s;  
  }  
  
  .tier-dot.filled {  
    background: currentColor;  
    box-shadow: 0 0 6px currentColor, 0 0 12px currentColor;  
    border-color: currentColor;  
  }  
  
  .tier-dot.filled.tier-2 {  
    box-shadow: 0 0 8px currentColor, 0 0 16px currentColor, 0 0 24px currentColor;  
  }  
  
  .tier-dot.filled.tier-3 {  
    box-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 35px currentColor;  
    width: 9px;  
    height: 9px;  
  }  
  
  .skill-status-badge {  
    position: absolute;  
    top: 8px;  
    right: 8px;  
    font-size: 13px;  
  }  
  
  /* ── MISSION MODAL ── */  
  #mission-modal {  
    display: none;  
    position: fixed;  
    inset: 0;  
    z-index: 200;  
    background: rgba(0,0,0,0.85);  
    backdrop-filter: blur(12px);  
    -webkit-backdrop-filter: blur(12px);  
    align-items: flex-end;  
    justify-content: center;  
    padding: 0;  
  }  
  
  #mission-modal.active {  
    display: flex;  
    animation: modal-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);  
  }  
  
  @keyframes modal-in {  
    from { opacity: 0; transform: translateY(40px); }  
    to { opacity: 1; transform: translateY(0); }  
  }  
  
  .modal-sheet {  
    background: #0d0d18;  
    border: 1px solid rgba(255,255,255,0.08);  
    border-radius: 28px 28px 0 0;  
    padding: 10px 24px 44px;  
    width: 100%;  
    max-width: 600px;  
    position: relative;  
    touch-action: pan-y;
    transition: transform 0.22s ease, opacity 0.22s ease;
    will-change: transform;
  }  

  .modal-sheet.dragging {
    transition: none;
  }
  
  .modal-drag-handle {  
    width: 40px;  
    height: 4px;  
    background: rgba(255,255,255,0.15);  
    border-radius: 2px;  
    margin: 10px auto 20px;  
  }  
  
  .modal-skill-name {  
    font-family: 'Orbitron', monospace;  
    font-size: 15px;  
    font-weight: 900;  
    letter-spacing: 2px;  
    margin-bottom: 4px;  
  }  
  
  .modal-tier-label {  
    font-size: 11px;  
    color: rgba(255,255,255,0.35);  
    letter-spacing: 2px;  
    text-transform: uppercase;  
    margin-bottom: 16px;  
  }  
  
  .modal-mission-header {  
    font-family: 'Orbitron', monospace;  
    font-size: 9px;  
    letter-spacing: 3px;  
    color: rgba(255,255,255,0.25);  
    text-transform: uppercase;  
    margin-bottom: 8px;  
  }  
  
  .modal-mission-text {  
    font-size: 15px;  
    line-height: 1.6;  
    color: rgba(255,255,255,0.8);  
    margin-bottom: 24px;  
    padding: 14px;  
    background: rgba(255,255,255,0.03);  
    border-radius: 12px;  
    border: 1px solid rgba(255,255,255,0.06);  
  }  
  
  .modal-tier-progress {  
    display: flex;  
    gap: 8px;  
    margin-bottom: 24px;  
    align-items: center;  
  }  
  
  .modal-tier-dot {  
    width: 12px;  
    height: 12px;  
    border-radius: 50%;  
    background: rgba(255,255,255,0.1);  
    border: 1.5px solid rgba(255,255,255,0.2);  
    transition: all 0.4s;  
  }  
  
  .modal-tier-dot.filled {  
    background: currentColor;  
    box-shadow: 0 0 10px currentColor, 0 0 20px currentColor;  
    border-color: currentColor;  
  }  
  
  .modal-tier-text {  
    font-size: 12px;  
    color: rgba(255,255,255,0.35);  
    letter-spacing: 1px;  
    margin-left: 4px;  
  }  
  
  .modal-complete-btn {  
    width: 100%;  
    padding: 16px;  
    border: none;  
    border-radius: 16px;  
    font-family: 'Orbitron', monospace;  
    font-size: 12px;  
    font-weight: 700;  
    letter-spacing: 3px;  
    text-transform: uppercase;  
    cursor: pointer;  
    transition: all 0.2s;  
    margin-bottom: 10px;  
  }  
  
  .modal-complete-btn:active { transform: scale(0.97); }  
  
  .modal-close-btn {  
    width: 100%;  
    padding: 12px;  
    border: none;  
    background: transparent;  
    color: rgba(255,255,255,0.3);  
    font-family: 'Rajdhani', sans-serif;  
    font-size: 14px;  
    cursor: pointer;  
    letter-spacing: 1px;  
  }  
  
  /* ── UNLOCK FLASH ── */  
  #unlock-flash {  
    display: none;  
    position: fixed;  
    inset: 0;  
    z-index: 300;  
    pointer-events: none;  
    align-items: center;  
    justify-content: center;  
    flex-direction: column;  
    gap: 12px;  
  }  
  
  #unlock-flash.active {  
    display: flex;  
    animation: flash-anim 1.6s forwards;  
  }  
  
  @keyframes flash-anim {  
    0% { opacity: 0; }  
    15% { opacity: 1; }  
    70% { opacity: 1; }  
    100% { opacity: 0; }  
  }  
  
  .flash-ring {  
    width: 120px;  
    height: 120px;  
    border-radius: 50%;  
    border: 3px solid currentColor;  
    box-shadow: 0 0 30px currentColor, 0 0 60px currentColor, inset 0 0 30px rgba(255,255,255,0.1);  
    display: flex;  
    align-items: center;  
    justify-content: center;  
    font-size: 40px;  
    animation: ring-pulse 0.4s ease-out;  
  }  
  
  @keyframes ring-pulse {  
    0% { transform: scale(0.5); }  
    100% { transform: scale(1); }  
  }  
  
  .flash-text {  
    font-family: 'Orbitron', monospace;  
    font-size: 14px;  
    font-weight: 900;  
    letter-spacing: 4px;  
    color: #fff;  
    text-shadow: 0 0 20px currentColor;  
    text-align: center;  
  }  
  
  .flash-subtext {  
    font-size: 12px;  
    color: rgba(255,255,255,0.5);  
    letter-spacing: 2px;  
    text-align: center;  
  }  


  /* ── DANGER RESET CONTROL ── */
  .danger-zone {
    margin: 34px 0 8px;
    padding: 18px 0 4px;
    display: flex;
    justify-content: center;
  }

  .reset-btn {
    background: linear-gradient(135deg, rgba(239,68,68,0.95), rgba(127,29,29,0.95));
    border: 1px solid rgba(248,113,113,0.75);
    border-radius: 14px;
    color: #0b0303;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 3px;
    padding: 13px 22px;
    text-transform: uppercase;
    box-shadow: 0 0 14px rgba(239,68,68,0.45), inset 0 0 10px rgba(255,255,255,0.14);
    cursor: pointer;
  }

  .reset-btn:active { transform: scale(0.96); }

  #reset-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 260;
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  #reset-modal.active {
    display: flex;
    animation: modal-in 0.25s ease-out;
  }

  .reset-confirm-card {
    width: 100%;
    max-width: 420px;
    background: linear-gradient(180deg, #11070a, #0d0d18 72%);
    border: 1px solid rgba(239,68,68,0.42);
    border-radius: 24px;
    padding: 24px 20px 20px;
    box-shadow: 0 0 28px rgba(239,68,68,0.24), inset 0 0 22px rgba(239,68,68,0.05);
    position: relative;
    overflow: hidden;
  }

  .reset-confirm-card::before {
    content: '';
    position: absolute;
    inset: -2px;
    background: radial-gradient(circle at top, rgba(239,68,68,0.18), transparent 58%);
    pointer-events: none;
  }

  .reset-alert-icon {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    border: 2px solid #ef4444;
    color: #ef4444;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 26px;

let state = {};

let currentSkill = null;

const XP_VALUES = [0, 100, 250, 500];
const RANKS = {

function todayKey(date = new Date()) { return date.toISOString().slice(0,10); }

}
function loadState() {

      const tier = Number(state.progress[bKey][sk.id].tier || 0);
      state.progress[bKey][sk.id].tier = Number.isFinite(tier) ? Math.max(0, Math.min(3, Math.floor(tier))) : 0;

function saveState() { try { localStorage.setItem('lifeTreeState', JSON.stringify(state)); } catch(e) {} }
function getRequirementProgress(bKey, requirement) { if (typeof requirement === 'string') return { id: requirement, needed: 3 }; return { id: requirement.id, needed: requirement.tier || 3 }; }

function openResetModal(){document.getElementById('reset-modal').classList.add('active');}
function closeResetModal(e){if(e && e.target !== document.getElementById('reset-modal'))return; document.getElementById('reset-modal').classList.remove('active');}
function confirmFullReset(){try{localStorage.removeItem('lifeTreeState');}catch(e){} state=blankState(); loadState(); saveState(); renderOverview(); if(currentBranch){renderTree(currentBranch); const prog=getBranchProgress(currentBranch); document.getElementById('bv-xp').textContent=`${getBranchXP(currentBranch)} XP · ${prog.completed}/${prog.total} SKILLS · ${getBranchRank(currentBranch)}`;} closeResetModal(); showUnlockFlash('#ef4444','⟲','ALL PROGRESS RESET',3);}

function setupMissionSwipeClose(){ const sheet=document.getElementById('modal-sheet'); let sy=0,cy=0,active=false; sheet.addEventListener('touchstart',e=>{ if(!document.getElementById('mission-modal').classList.contains('active'))return; sy=e.touches[0].clientY; cy=sy; active=true; sheet.classList.add('dragging'); },{passive:true}); sheet.addEventListener('touchmove',e=>{ if(!active)return; cy=e.touches[0].clientY; const delta=Math.max(0,cy-sy); if(delta>0){sheet.style.transform=`translateY(${delta}px)`; sheet.style.opacity=String(Math.max(.45,1-delta/420));} },{passive:true}); sheet.addEventListener('touchend',()=>{ if(!active)return; const delta=Math.max(0,cy-sy); active=false; sheet.classList.remove('dragging'); if(delta>90) closeMissionModal(); else {sheet.style.transform='';sheet.style.opacity='';} }); }
function setupBranchSwipeBack(){ const view=document.getElementById('branch-view'); let sx=0,sy=0,cx=0,cy=0,active=false,horizontal=false; view.addEventListener('touchstart',e=>{ if(!view.classList.contains('active') || document.getElementById('mission-modal').classList.contains('active') || e.touches.length!==1)return; sx=e.touches[0].clientX; sy=e.touches[0].clientY; cx=sx; cy=sy; active=true; horizontal=false; view.classList.remove('returning-home'); },{passive:true}); view.addEventListener('touchmove',e=>{ if(!active || document.getElementById('mission-modal').classList.contains('active'))return; cx=e.touches[0].clientX; cy=e.touches[0].clientY; const dx=cx-sx, dy=cy-sy; if(!horizontal && dx>18 && Math.abs(dx)>Math.abs(dy)*1.25){horizontal=true; view.classList.add('swiping-back');} if(horizontal && dx>0){e.preventDefault(); const d=Math.min(dx,window.innerWidth||390); view.style.transform=`translateX(${d}px)`; view.style.opacity=String(Math.max(.35,1-d/520));} },{passive:false}); view.addEventListener('touchend',()=>{ if(!active)return; const dx=cx-sx, dy=cy-sy, go=horizontal && dx>90 && dx>Math.abs(dy)*1.2; active=false; horizontal=false; view.classList.remove('swiping-back'); view.classList.add('returning-home'); if(go){view.style.transform=`translateX(${window.innerWidth||390}px)`; view.style.opacity='0'; setTimeout(closeBranch,210);} else {view.style.transform=''; view.style.opacity=''; setTimeout(()=>view.classList.remove('returning-home'),230);} }); }
function showStartupError(error){ const grid=document.getElementById('branches-grid'); if(!grid)return; grid.innerHTML=`<div style="grid-column:1/-1; background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.45); border-radius:16px; padding:16px; color:#fff; line-height:1.45;"><div style="font-family:Orbitron,monospace; color:#ef4444; margin-bottom:8px;">APP LOAD ERROR</div><div>The saved progress data on this device may be corrupted. Tap reset below, then refresh the file.</div><button onclick="localStorage.removeItem('lifeTreeState'); location.reload();" style="margin-top:12px; padding:12px 14px; border:0; border-radius:12px; background:#ef4444; color:#000; font-family:Orbitron,monospace; font-weight:700;">RESET SAVED PROGRESS</button></div>`; console.error('Life Tree startup error:',error); }
function initLifeTree(){try{loadState(); renderOverview(); setupMissionSwipeClose(); setupBranchSwipeBack();}catch(error){showStartupError(error);}}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', initLifeTree); else initLifeTree();

</script>
